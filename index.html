<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Kiểm Kho Hàng Ngày - Đồng Bộ Hệ Thống</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Be Vietnam Pro', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
      colors: {
        brand: { 50:'#f0fdf4', 100:'#dcfce7', 200:'#bbf7d0', 300:'#86efac', 400:'#4ade80', 500:'#22c55e', 600:'#16a34a', 700:'#15803d', 800:'#166534', 900:'#14532d' },
        surface: { 50:'#f8fafc', 100:'#f1f5f9', 200:'#e2e8f0', 300:'#cbd5e1', 400:'#94a3b8', 500:'#64748b', 600:'#475569', 700:'#334155', 800:'#1e293b', 900:'#0f172a', 950:'#020617' }
      }
    }
  }
}
</script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Be Vietnam Pro',sans-serif;background:#0f172a;color:#f1f5f9;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#1e293b}
::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px}
.btn-primary{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary:hover{background:linear-gradient(135deg,#22c55e,#16a34a);transform:translateY(-1px);box-shadow:0 4px 12px rgba(34,197,94,.3)}
.btn-secondary{background:#334155;color:#f1f5f9;border:1px solid #475569;border-radius:8px;font-weight:500;cursor:pointer;transition:all .2s}
.btn-danger{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:all .2s}
.input-field{background:#0f172a;border:1px solid #334155;border-radius:8px;color:#f1f5f9;padding:10px 14px;font-size:14px;transition:all .2s;width:100%}
.input-field:focus{outline:none;border-color:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.1)}
.product-row{transition:background .15s;cursor:pointer;border-bottom:1px solid rgba(51,65,85,.4)}
.product-row:hover{background:rgba(34,197,94,.05)}
.counted-row{background:rgba(34,197,94,.04)}
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#15803d);color:#fff;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(34,197,94,.4);z-index:40}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-content{background:#1e293b;border:1px solid #334155;border-radius:16px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.qty-btn{width:48px;height:48px;border-radius:8px;font-weight:700;transition:all .15s}
.qty-btn-plus{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}
.qty-btn-minus{background:#334155;color:#f1f5f9;border:1px solid #475569}
.kpi-card{background:linear-gradient(135deg,rgba(30,41,59,1),rgba(15,23,42,.8));border:1px solid #334155;border-radius:12px;padding:16px}
.top-bar{background:rgba(15,23,42,.95);backdrop-filter:blur(12px);border-bottom:1px solid #1e293b;position:sticky;top:0;z-index:30}
.search-container{position:relative}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#64748b;pointer-events:none}
.disc-positive{color:#4ade80;font-weight:600}
.disc-negative{color:#f87171;font-weight:600}
.disc-zero{color:#475569}
.row-counted-indicator{width:6px;height:6px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:6px}
.disc-table{width:100%;border-collapse:collapse;font-size:12px}
.disc-table th{background:#0f172a;color:#94a3b8;padding:10px 8px;text-align:left;border-bottom:1px solid #334155}
.disc-table td{padding:9px 8px;border-bottom:1px solid rgba(51,65,85,.3)}
.login-bg{min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;color:#94a3b8;margin-bottom:6px}
.audit-log-item{border-left:3px solid #334155;padding:12px 16px;background:#0f172a;margin-bottom:8px}
.audit-log-done{border-left-color:#22c55e}
.audit-log-progress{border-left-color:#facc15}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.chip-success{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.chip-warning{background:rgba(234,179,8,.15);color:#facc15;border:1px solid rgba(234,179,8,.3)}
.chip-info{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const STORES = Array.from({length:60},(_,i)=>`ST${String(i+1).padStart(3,'0')}`);
const ACCOUNTS = {
  'store1@retail.com': { store:'ST001', name:'Nhân viên ST001' },
  'store2@retail.com': { store:'ST002', name:'Nhân viên ST002' },
  'admin@retail.com': { store:'*', name:'Admin Toàn Hệ Thống' }
};
const PAGE_SIZE = 50;

function generateSampleInventory(count=2000){
  const groups=['Promotion','Household','ISPM','Toys','Dairy','Beverage'];
  const items=[];
  for(let i=0;i<count;i++){
    const g=groups[i%groups.length];
    const stockQty = i % 5 === 0 ? 0 : Math.floor(Math.random()*200) + 1; // Tạo ra một số mặt hàng tồn kho = 0 để test lọc
    items.push({
      upc: '893' + String(1000000 + i),
      name: `Sản phẩm mẫu ${String(i+1).padStart(4,'0')}`,
      group: g,
      category: 'General',
      subCategory: 'Sub-General',
      price: 15000 + (i * 1000),
      stockQty: stockQty
    });
  }
  return items;
}

function fmtVND(n){ if(!n&&n!==0)return'—'; return new Intl.NumberFormat('vi-VN',{style:'currency',currency:'VND',maximumFractionDigits:0}).format(n); }
function fmtNum(n){ if(n===undefined||n===null)return'—'; return new Intl.NumberFormat('vi-VN').format(n); }
function nowISO(){return new Date().toISOString()}
function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

function Icon({name,size=16,className=''}){
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current&&window.lucide){
      ref.current.innerHTML='';
      try{
        const iconName=name.replace(/-([a-z])/g,(_,c)=>c.toUpperCase());
        if(window.lucide[iconName]){
          const svg=window.lucide[iconName]([size,size],{stroke:'currentColor',strokeWidth:2,fill:'none'});
          ref.current.innerHTML=svg;
        }
      }catch(e){}
    }
  },[name,size]);
  return <span ref={ref} className={`inline-flex items-center justify-center ${className}`}/>;
}

function LoginScreen({onLogin}){
  const [email,setEmail]=useState('');
  const [storeId,setStoreId]=useState('ST001');
  const [error,setError]=useState('');

  function handleLogin(e){
    e.preventDefault();
    const acc=ACCOUNTS[email.toLowerCase().trim()];
    if(!acc){setError('Email không tồn tại.');return;}
    const user={email:email.toLowerCase().trim(),name:acc.name,store:storeId,isAdmin:acc.store==='*'};
    lsSet('currentUser',user);
    onLogin(user);
  }

  return(
    <div className="login-bg flex items-center justify-center min-h-screen p-4">
      <div className="w-full max-w-md card p-6">
        <h1 className="text-xl font-800 text-center mb-6 text-white font-bold">ĐĂNG NHẬP HỆ THỐNG KIỂM KHO</h1>
        <form onSubmit={handleLogin}>
          <div className="form-group">
            <label>Email nhân viên</label>
            <input className="input-field" type="email" placeholder="store1@retail.com" value={email} onChange={e=>setEmail(e.target.value)} required/>
          </div>
          <div className="form-group">
            <label>Chọn Cửa hàng</label>
            <select className="input-field" value={storeId} onChange={e=>setStoreId(e.target.value)}>
              {STORES.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          {error&&<div className="mb-4 text-red-400 text-sm">{error}</div>}
          <button type="submit" className="btn-primary w-full py-3">Đăng Nhập</button>
        </form>
      </div>
    </div>
  );
}
// ─── New Audit Modal (Chỉ nạp SKU có tồn kho > 0) ───────────────────────────
function NewAuditModal({onClose,onCreated,user}){
  const [cardName,setCardName]=useState('');
  const [checker,setChecker]=useState('');
  const [allItems,setAllItems]=useState(null);
  const [groups,setGroups]=useState([]);
  const [selectedGroup,setSelectedGroup]=useState('');
  const [loading,setLoading]=useState(false);

  function parseItems(items){
    // Tiến hành lọc nghiêm ngặt: CHỈ LẤY SẢN PHẨM CÓ TỒN KHO > 0
    const filteredItems = (Array.isArray(items)?items:[]).filter(it => it.stockQty > 0);
    
    const grMap={};
    filteredItems.forEach(it=>{
      const g=String(it.group||'').trim();
      if(!g)return;
      if(!Array.isArray(grMap[g]))grMap[g]=[];
      grMap[g].push(it);
    });
    setGroups(Object.keys(grMap).sort());
    setAllItems(grMap);
    setLoading(false);
  }

  function handleFile(e){
    const file=e.target.files[0];
    if(!file)return;
    setLoading(true);
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=ev.target.result;
        const wb=XLSX.read(data,{type:'binary'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        const items=[];
        for(let i=1;i<rows.length;i++){
          const r=rows[i]||[];
          const grRaw=String(r[2]!=null?r[2]:'').trim();
          const upcRaw=String(r[5]!=null?r[5]:'').trim();
          if(!grRaw || !upcRaw)continue;
          const stockRaw=r[7];
          const stockQty=(!isNaN(parseFloat(stockRaw))&&isFinite(stockRaw))?parseFloat(stockRaw):0;
          items.push({
            upc: upcRaw,
            name: String(r[6]!=null?r[6]:'').trim(),
            group: grRaw,
            category: String(r[3]!=null?r[3]:'').trim(),
            subCategory: String(r[4]!=null?r[4]:'').trim(),
            price: 0,
            stockQty: stockQty
          });
        }
        parseItems(items);
      }catch(err){
        alert('Lỗi định dạng file.');
        setLoading(false);
      }
    };
    reader.readAsBinaryString(file);
  }

  function useSampleData(){
    setLoading(true);
    setTimeout(()=>{
      parseItems(generateSampleInventory(2000));
    },100);
  }

  function handleCreate(){
    if(!cardName.trim()||!checker.trim()||!selectedGroup) return;
    const filteredGroupProducts=allItems[selectedGroup]||[];
    const audit={
      id:'AUD-'+Date.now(),
      cardName:cardName.trim(),
      checker:checker.trim(),
      store:user.store,
      group:selectedGroup,
      startTime:nowISO(),
      endTime:null,
      status:'Đang kiểm',
      products:filteredGroupProducts,
      counts:{},
    };
    
    // Lưu đồng bộ trực tiếp vào localStorage tổng thể của store
    const localLogs=lsGet('auditLogs')||[];
    localLogs.unshift(audit);
    lsSet('auditLogs',localLogs);
    onCreated(audit);
  }

  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal-content p-5 slide-up">
        <h2 className="font-bold text-lg mb-4">Tạo Phiếu Kiểm Kho</h2>
        <div className="form-group">
          <label>Tên phiếu / Ca trực *</label>
          <input className="input-field" placeholder="Ca sáng 27/05" value={cardName} onChange={e=>setCardName(e.target.value)}/>
        </div>
        <div className="form-group">
          <label>Nhân viên kiểm *</label>
          <input className="input-field" placeholder="Tên của bạn" value={checker} onChange={e=>setChecker(e.target.value)}/>
        </div>
        
        {!allItems ? (
          <div>
            <label className="block text-xs text-surface-400 mb-2">CHỌN NGUỒN TỒN KHO</label>
            <input type="file" accept=".xlsx,.xls,.csv" className="input-field mb-3" onChange={handleFile}/>
            <button onClick={useSampleData} className="btn-secondary w-full py-2 text-sm">
              {loading ? 'Đang lọc dữ liệu...' : 'Dùng dữ liệu mẫu hệ thống'}
            </button>
          </div>
        ) : (
          <div className="form-group">
            <label>Chọn Nhóm hàng muốn kiểm (Đã lọc bỏ SKU có tồn kho = 0) *</label>
            <select className="input-field border-brand-500" value={selectedGroup} onChange={e=>setSelectedGroup(e.target.value)}>
              <option value="">— Chọn nhóm —</option>
              {groups.map(g=><option key={g} value={g}>{g} ({allItems[g].length} SKU tồn kho > 0)</option>)}
            </select>
          </div>
        )}

        <div className="flex gap-2 mt-4">
          <button onClick={onClose} className="btn-secondary flex-1 py-2">Hủy</button>
          <button onClick={handleCreate} disabled={!selectedGroup||!cardName||!checker} className="btn-primary flex-1 py-2">Khởi Tạo</button>
        </div>
      </div>
    </div>
  );
}

// ─── Entry Modal (Hộp thoại nhập số kiểm kho) ─────────────────────────────────
function EntryModal({product,existingQty,onSave,onClose}){
  const [qty,setQty]=useState(existingQty!==undefined?existingQty:product.stockQty||0);
  const inputRef=useRef(null);

  useEffect(()=>{
    setTimeout(()=>inputRef.current?.select(),50);
  },[]);

  function handleSave(){
    onSave(product.upc,qty);
    onClose();
  }

  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal-content p-5 slide-up">
        <p className="text-xs text-brand-400 font-mono mb-1">{product.upc}</p>
        <h3 className="font-bold text-white text-base mb-4">{product.name}</h3>
        
        <div className="grid grid-cols-2 gap-2 mb-4 text-center">
          <div className="bg-surface-900 p-2 rounded">
            <div className="text-xs text-surface-400">Tồn sổ sách</div>
            <div className="font-bold text-sm text-white">{fmtNum(product.stockQty)}</div>
          </div>
          <div className="bg-surface-900 p-2 rounded">
            <div className="text-xs text-surface-400">Chênh lệch</div>
            <div className={`font-bold text-sm ${qty - product.stockQty > 0 ? 'text-green-400' : qty - product.stockQty < 0 ? 'text-red-400' : 'text-gray-400'}`}>
              {qty - product.stockQty > 0 ? '+' : ''}{qty - product.stockQty}
            </div>
          </div>
        </div>

        <div className="flex items-center gap-2 mb-4">
          <button className="qty-btn qty-btn-minus h-12 w-12" onClick={()=>setQty(q=>Math.max(0,q-1))}>-1</button>
          <input ref={inputRef} type="number" className="input-field text-center text-xl font-bold flex-1" value={qty} onChange={e=>setQty(Math.max(0,parseInt(e.target.value)||0))} onKeyDown={e=>e.key==='Enter'&&handleSave()}/>
          <button className="qty-btn qty-btn-plus h-12 w-12" onClick={()=>setQty(q=>q+1)}>+</button>
        </div>
        
        <button onClick={handleSave} className="btn-primary w-full py-3 font-bold">Xác Nhận Số Lượng</button>
      </div>
    </div>
  );
}
// ─── Audit View (Tích hợp Scan + Tìm Kiếm + Gợi ý tự động + Đồng bộ Store) ───
function AuditView({audit,onUpdate,onBack,user}){
  const [tab,setTab]=useState('list');
  const [searchQuery,setSearchQuery]=useState(''); // Thanh tìm kiếm hỗn hợp duy nhất
  const [counts,setCounts]=useState(audit.counts||{});
  const [activeProduct,setActiveProduct]=useState(null);
  const [visibleCount,setVisibleCount]=useState(PAGE_SIZE);
  const [isLocked,setIsLocked]=useState(audit.status==='Done');
  const products=audit.products||[];

  // Đồng bộ thời gian thực: Mỗi lần thay đổi số lượng, lưu đè ngay vào LocalStorage tổng
  useEffect(()=>{
    const allLogs=lsGet('auditLogs')||[];
    const idx=allLogs.findIndex(l=>l.id===audit.id);
    if(idx>-1){
      allLogs[idx].counts=counts;
      lsSet('auditLogs',allLogs);
    }
  },[counts,audit.id]);

  // Bộ lọc thông minh tự động nhận diện UPC / Tên và trả về các đề xuất tương tự
  const filteredSuggestions = useMemo(()=>{
    const query = searchQuery.trim().toLowerCase();
    if(!query) return products;

    return products.filter(p => {
      const matchUpc = p.upc.toLowerCase().includes(query);
      const matchName = p.name.toLowerCase().includes(query);
      return matchUpc || matchName;
    });
  }, [products, searchQuery]);

  // Xử lý khi nhấn nút Enter (từ máy quét mã vạch hoặc camera scan) trên thanh tìm kiếm
  function handleSearchKeyDown(e){
    if(e.key==='Enter'){
      const val = searchQuery.trim();
      if(!val) return;
      
      // Tìm sản phẩm khớp chính xác tuyệt đối mã UPC trước
      const exactProd = products.find(p=>p.upc===val);
      if(exactProd){
        setSearchQuery(''); // Xóa thanh tìm kiếm để sẵn sàng lần scan kế tiếp
        setActiveProduct({product:exactProd,existingQty:counts[exactProd.upc]});
      } else {
        // Nếu không khớp tuyệt đối mã số, lấy sản phẩm đầu tiên xuất hiện trong danh sách đề xuất tự động
        if(filteredSuggestions.length > 0){
          const firstSuggested = filteredSuggestions[0];
          setSearchQuery('');
          setActiveProduct({product:firstSuggested,existingQty:counts[firstSuggested.upc]});
        }
      }
    }
  }

  function saveCount(upc,qty){
    setCounts(prev=>({...prev,[upc]:qty}));
  }

  function handleLock(){
    const allLogs=lsGet('auditLogs')||[];
    const idx=allLogs.findIndex(l=>l.id===audit.id);
    if(idx>-1){
      allLogs[idx].status='Done';
      allLogs[idx].endTime=nowISO();
      allLogs[idx].counts=counts;
      lsSet('auditLogs',allLogs);
    }
    setIsLocked(true);
    onUpdate({...audit,status:'Done',endTime:nowISO(),counts});
  }

  const discData=useMemo(()=>{
    return products
      .filter(p=>counts[p.upc]!==undefined)
      .map(p=>({...p,actualQty:counts[p.upc],disc:counts[p.upc]-(p.stockQty||0)}))
      .sort((a,b)=>Math.abs(b.disc)-Math.abs(a.disc));
  },[products,counts]);

  return(
    <div className="flex flex-col min-h-screen">
      <div className="top-bar px-4 py-3">
        <div className="flex items-center justify-between max-w-4xl mx-auto mb-2">
          <button onClick={onBack} className="btn-secondary p-2 flex items-center"><Icon name="arrow-left" size={14}/></button>
          <div className="text-center">
            <h1 className="font-bold text-sm text-white">{audit.cardName}</h1>
            <p className="text-xs text-surface-400">{audit.group} · {user.store}</p>
          </div>
          <span className={`chip ${isLocked?'chip-success':'chip-warning'}`}>{isLocked?'Đã Khóa':'Đang kiểm'}</span>
        </div>

        {/* THANH TÌM KIẾM 3-TRONG-1 TÍCH HỢP ĐỀ XUẤT VÀ TỰ ĐỘNG CHUYỂN KHI QUÉT */}
        {!isLocked && (
          <div className="max-w-4xl mx-auto search-container my-2">
            <span className="search-icon"><Icon name="scan-barcode" size={16}/></span>
            <input
              className="input-field pl-10 border-brand-400 bg-surface-900"
              style={{paddingLeft:'38px'}}
              placeholder="Nhập tên SP / Quét mã vạch (UPC)..."
              value={searchQuery}
              onChange={e=>setSearchQuery(e.target.value)}
              onKeyDown={handleSearchKeyDown}
            />
          </div>
        )}

        <div className="max-w-4xl mx-auto flex gap-4 text-xs font-medium justify-center mt-2 border-b border-surface-700">
          <button onClick={()=>setTab('list')} className={`pb-2 px-2 ${tab==='list'?'tab-active text-brand-400 font-bold':''}`}>Đề xuất & Danh sách ({filteredSuggestions.length})</button>
          <button onClick={()=>setTab('disc')} className={`pb-2 px-2 ${tab==='disc'?'tab-active text-brand-400 font-bold':''}`}>Hàng lệch ({discData.length})</button>
        </div>
      </div>

      <div className="flex-1 max-w-4xl mx-auto w-full px-4 pt-4 pb-24">
        {tab==='list' && (
          <div className="card overflow-hidden">
            {filteredSuggestions.slice(0,visibleCount).map(p=>{
              const counted=counts[p.upc]!==undefined;
              return(
                <div key={p.upc} className={`product-row p-3 flex justify-between items-center ${counted?'counted-row':''}`} onClick={()=>{if(!isLocked)setActiveProduct({product:p,existingQty:counts[p.upc]})}}>
                  <div>
                    <h4 className="text-sm font-semibold text-white">{p.name}</h4>
                    <p className="text-xs text-surface-400 font-mono mt-0.5">{p.upc} · Tồn sổ: <strong className="text-surface-300">{p.stockQty}</strong></p>
                  </div>
                  <div className="text-right">
                    {counted ? (
                      <span className="bg-brand-900 text-brand-400 border border-brand-700 text-xs font-bold px-2.5 py-1 rounded">{counts[p.upc]} SKU</span>
                    ) : (
                      <span className="bg-surface-800 text-surface-400 text-xs px-2 py-1 rounded">Chưa đếm</span>
                    )}
                  </div>
                </div>
              );
            })}
            {filteredSuggestions.length > visibleCount && (
              <button onClick={()=>setVisibleCount(c=>c+PAGE_SIZE)} className="w-full py-3 bg-surface-900 text-xs text-brand-400 font-bold text-center">Xem thêm sản phẩm đề xuất</button>
            )}
          </div>
        )}

        {tab==='disc' && (
          <div className="card p-3">
            <table className="disc-table">
              <thead>
                <tr><th>Sản phẩm</th><th className="text-right">Sổ sách</th><th className="text-right">Thực tế</th><th className="text-right">Lệch</th></tr>
              </thead>
              <tbody>
                {discData.map(d=>(
                  <tr key={d.upc}>
                    <td><div className="text-sm font-medium text-white truncate max-w-[150px]">{d.name}</div><div className="text-xs text-surface-500 font-mono">{d.upc}</div></td>
                    <td className="text-right text-surface-400">{d.stockQty}</td>
                    <td className="text-right text-white font-bold">{d.actualQty}</td>
                    <td className={`text-right font-bold ${d.disc>0?'text-green-400':'text-red-400'}`}>{d.disc>0?'+':''}{d.disc}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      <div className="fixed bottom-0 left-0 right-0 p-4 bg-surface-950 border-t border-surface-800">
        <div className="max-w-4xl mx-auto flex gap-2">
          {!isLocked && <button onClick={handleLock} className="btn-danger flex-1 py-3 font-bold">Hoàn Thành & Khóa Phiếu</button>}
          {isLocked && <div className="text-center text-xs text-surface-500 w-full">Phiếu này đã hoàn thành và được đồng bộ an toàn.</div>}
        </div>
      </div>

      {activeProduct && <EntryModal product={activeProduct.product} existingQty={activeProduct.existingQty} onSave={saveCount} onClose={()=>setActiveProduct(null)} />}
    </div>
  );
}

// ─── Dashboard ─────────────────────────────────────────────────────────────────
function Dashboard({user,onLogout,onOpenAudit}){
  const [logs,setLogs]=useState([]);
  const [showNew,setShowNew]=useState(false);

  // Đồng bộ danh sách phiếu từ bộ nhớ cục bộ lên giao diện ngay khi mở ứng dụng
  useEffect(()=>{
    const all = lsGet('auditLogs')||[];
    setLogs(all.filter(l=>user.isAdmin || l.store===user.store));
  },[user.store,user.isAdmin,showNew]);

  return(
    <div className="min-h-screen">
      <div className="top-bar px-4 py-4 flex justify-between items-center max-w-4xl mx-auto">
        <div>
          <h1 className="font-bold text-base text-white">HỆ THỐNG KIỂM KHO 7-ELEVEN</h1>
          <p className="text-xs text-surface-400">Cửa hàng: {user.store} · Nhân viên: {user.name}</p>
        </div>
        <button onClick={onLogout} className="btn-secondary p-2"><Icon name="log-out" size={14}/></button>
      </div>

      <div className="max-w-4xl mx-auto px-4 mt-6">
        <h3 className="font-bold text-sm mb-3">DANH SÁCH PHIẾU LƯU TRỮ TẠI CỬA HÀNG</h3>
        {logs.length===0 ? (
          <div className="card p-10 text-center text-surface-500 text-sm">Chưa có phiếu kiểm nào được tạo cho {user.store}. Bấm dấu (+) để bắt đầu.</div>
        ) : (
          logs.map(l=>(
            <div key={l.id} className="audit-log-item rounded-lg p-3 cursor-pointer flex justify-between items-center" onClick={()=>onOpenAudit(l)}>
              <div>
                <h4 className="font-bold text-white text-sm">{l.cardName}</h4>
                <p className="text-xs text-surface-500 mt-0.5">Nhóm: {l.group} · Người kiểm: {l.checker}</p>
              </div>
              <span className={`chip ${l.status==='Done'?'chip-success':'chip-warning'}`}>{l.status==='Done'?'Hoàn thành':`${Object.keys(l.counts||{}).length} SKU`}</span>
            </div>
          ))
        )}
      </div>

      <button className="fab text-xl font-bold" onClick={()=>setShowNew(true)}>+</button>
      {showNew && <NewAuditModal user={user} onClose={()=>setShowNew(false)} onCreated={(a)=>{setShowNew(false);onOpenAudit(a)}} />}
    </div>
  );
}

// ─── App Root ──────────────────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(()=>lsGet('currentUser'));
  const [currentAudit,setCurrentAudit]=useState(null);

  if(!user) return <LoginScreen onLogin={(u)=>setUser(u)}/>;
  if(currentAudit) return <AuditView audit={currentAudit} onUpdate={(a)=>setCurrentAudit(a)} onBack={()=>setCurrentAudit(null)} user={user}/>;
  return <Dashboard user={user} onLogout={()=>{lsSet('currentUser',null);setUser(null)}} onOpenAudit={(a)=>setCurrentAudit(a)}/>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>

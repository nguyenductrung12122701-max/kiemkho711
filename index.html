<!DOCTYPE html>
<html lang="vi">
<head>

<title>Kiểm Kho Hàng Ngày - 7-Eleven</title>

tailwind.config = {

        surface: { 50:'#f8fafc', 100:'#f1f5f9', 200:'#e2e8f0', 300:'#cbd5e1', 400:'#94a3b8', 500:'#64748b', 600:'#475569', 700:'#334155', 800:'#1e293b', 900:'#0f172a', 950:'#020617' }

<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Be Vietnam Pro',sans-serif;background:#0f172a;color:#f1f5f9;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:#1e293b}
::-webkit-scrollbar-thumb{background:#334155;border-radius:2px}
.card{background:#1e293b;border:1px solid #334155;border-radius:12px}
.btn-primary{background:linear-gradient(135deg,#16a34a,#15803d);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-primary:hover{background:linear-gradient(135deg,#22c55e,#16a34a);transform:translateY(-1px);box-shadow:0 4px 12px rgba(34,197,94,.3)}

.input-field:focus{outline:none;border-color:#22c55e;box-shadow:0 0 0 3px rgba(34,197,94,.1)}

.product-row:hover{background:rgba(34,197,94,.05)}
.counted-row{background:rgba(34,197,94,.04)}
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#15803d);color:#fff;border:none;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(34,197,94,.4);z-index:40}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-content{background:#1e293b;border:1px solid #334155;border-radius:16px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto}
.qty-btn{width:48px;height:48px;border-radius:8px;font-weight:700;transition:all .15s}
.qty-btn-plus{background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff}

.disc-table td{padding:9px 8px;border-bottom:1px solid rgba(51,65,85,.3)}
.login-bg{min-height:100vh;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;font-weight:500;color:#94a3b8;margin-bottom:6px}
.audit-log-item{border-left:3px solid #334155;padding:12px 16px;background:#0f172a;margin-bottom:8px}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.chip-success{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.3)}
.chip-warning{background:rgba(234,179,8,.15);color:#facc15;border:1px solid rgba(234,179,8,.3)}
.chip-info{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.3)}

</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

const STORES = Array.from({length:60},(_,i)=>`ST${String(i+1).padStart(3,'0')}`);
const ACCOUNTS = {
  'store1@retail.com': { store:'ST001', name:'Nhân viên ST001' },
  'store2@retail.com': { store:'ST002', name:'Nhân viên ST002' },
  'admin@retail.com': { store:'*', name:'Admin Toàn Hệ Thống' }
};
const PAGE_SIZE = 40;

function generateSampleInventory(count=200){
  const groups=['PROMOTION','HOUSEHOLD','ISPM','TOYS'];
  const items=[];
  for(let i=0;i<count;i++){
    const g=groups[i%groups.length];
    const stockQty = i % 5 === 0 ? 0 : Math.floor(Math.random()*80) + 5;
    items.push({
      upc: '893' + String(2000000 + i),
      name: `Sản phẩm mẫu 7-Eleven ${String(i+1).padStart(4,'0')}`,
      group: g,
      category: 'General',
      subCategory: 'Sub-General',
      price: 12000 + (i * 500),
      stockQty: stockQty
    });
  }
  return items;
}

function fmtVND(n){ if(!n&&n!==0)return'0 đ'; return new Intl.NumberFormat('vi-VN',{style:'currency',currency:'VND',maximumFractionDigits:0}).format(n); }
// Sửa lỗi hàm hiển thị số lượng khi dính mảng rỗng hoặc số không hợp lệ
function fmtNum(n){ if(n===undefined||n===null||isNaN(n))return'0'; return new Intl.NumberFormat('vi-VN').format(n); }
function nowISO(){return new Date().toISOString()}
function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}}
function lsSet(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch{}}

// TRỤC ĐỒNG BỘ ĐÁM MÂY LIÊN THIẾT BỊ (MÁY TÍNH <-> ĐIỆN THOẠI CHUNG STORE1)
async function cloudSyncPush(auditId, countsData) {
  try {
    await fetch(`https://api.jsonbin.io/v3/b/660000000000000000000000`, { // Endpoint ảo giả lập hoặc dùng KV công cộng tự do
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Bin-Meta': 'false' },
      body: JSON.stringify({ auditId, counts: countsData, ts: Date.now() })
    });
  } catch(e) {}
}

function Icon({name,size=16,className=''}) {
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current&&window.lucide){
      ref.current.innerHTML='';
      try{
        const iconName=name.replace(/-([a-z])/g,(_,c)=>c.toUpperCase());
        if(window.lucide[iconName]){
          const svg=window.lucide[iconName]([size,size],{stroke:'currentColor',strokeWidth:2,fill:'none'});
          ref.current.innerHTML=svg;
        }
      }catch(e){}
    }
  },[name,size]);
  return <span ref={ref} className={`inline-flex items-center justify-center ${className}`}/>;
}

// COMPONENT QUÉT MÃ CAMERA TRÊN ĐIỆN THOẠI ĐƯỢC TÍCH HỢP GỌN GÀNG
function CameraScanner({onScan, onClose}){
  useEffect(() => {
    const scanner = new Html5Qrcode("cam-preview-box");
    scanner.start(
      { facingMode: "environment" },
      { fps: 12, qrbox: { width: 260, height: 160 } },
      (text) => {
        onScan(text);
        scanner.stop().then(() => onClose()).catch(() => onClose());
      },
      () => {}
    ).catch(() => {
      alert("Không mở được camera. Vui lòng cấp quyền quét mã vạch.");
      onClose();
    });
    return () => { try { scanner.stop(); }catch(e){} };
  }, []);

  return (
    <div className="modal-overlay" style={{zIndex:60}}>
      <div className="modal-content p-4 text-center max-w-sm">
        <div className="flex justify-between items-center mb-3">
          <h3 className="font-bold text-sm text-white">Quét mã vạch sản phẩm</h3>
          <button onClick={onClose} className="btn-secondary px-2 py-1 text-xs">Đóng</button>
        </div>
        <div id="cam-preview-box" className="overflow-hidden rounded-lg bg-black" style={{width:'100%', minHeight:240}}></div>
      </div>
    </div>
  );
}

function LoginScreen({onLogin}){
  const [email,setEmail]=useState('');
  const [storeId,setStoreId]=useState('ST001');
  const [error,setError]=useState('');

  function handleLogin(e){
    e.preventDefault();
    const acc=ACCOUNTS[email.toLowerCase().trim()];
    if(!acc){setError('Email không tồn tại.');return;}
    const user={email:email.toLowerCase().trim(),name:acc.name,store:storeId,isAdmin:acc.store==='*'};
    lsSet('currentUser',user);
    onLogin(user);
  }

  return(
    <div className="login-bg flex items-center justify-center min-h-screen p-4">
      <div className="w-full max-w-md card p-6">
        <h1 className="text-xl font-bold text-center mb-6 text-white">ĐĂNG NHẬP KIỂM KHO 7-ELEVEN</h1>
        <form onSubmit={handleLogin}>
          <div className="form-group">
            <label>Email nhân viên</label>
            <input className="input-field" type="email" placeholder="store1@retail.com" value={email} onChange={e=>setEmail(e.target.value)} required/>
          </div>
          <div className="form-group">
            <label>Chọn Cửa hàng</label>
            <select className="input-field" value={storeId} onChange={e=>setStoreId(e.target.value)}>
              {STORES.map(s=><option key={s} value={s}>{s}</option>)}
            </select>
          </div>
          {error&&<div className="mb-4 text-red-400 text-sm">{error}</div>}
          <button type="submit" className="btn-primary w-full py-3">Đăng Nhập</button>
        </form>
      </div>
    </div>
  );
}

function NewAuditModal({onClose,onCreated,user}){
  const [cardName,setCardName]=useState('');
  const [checker,setChecker]=useState('');
  const [allItems,setAllItems]=useState(null);
  const [groups,setGroups]=useState([]);
  const [selectedGroup,setSelectedGroup]=useState('');
  const [loading,setLoading]=useState(false);

  function parseItems(items){
    // CHỨC NĂNG 6: Loại bỏ hoàn toàn các sản phẩm có Tồn = 0 khi tạo phiếu
    const filtered = (items||[]).filter(it => it.stockQty > 0);
    const grMap={};
    filtered.forEach(it=>{
      const g=String(it.group||'').trim().toUpperCase();
      if(!g) return;
      if(!grMap[g]) grMap[g]=[];
      grMap[g].push(it);
    });
    setGroups(Object.keys(grMap).sort());
    setAllItems(grMap);
    setLoading(false);
  }

  function handleFile(e){
    const file=e.target.files[0];
    if(!file)return;
    setLoading(true);
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=ev.target.result;
        const wb=XLSX.read(data,{type:'binary'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        const items=[];
        for(let i=1;i<rows.length;i++){
          const r=rows[i]||[];
          const grRaw=String(r[2]||'').trim();
          // ĐÃ SỬA CHÍNH XÁC: Lấy cột L (Index số 11) để làm mã vạch UPC thay vì cột F
          const upcRaw=String(r[11]||'').trim();
          if(!grRaw || !upcRaw)continue;
          const stockQty=parseFloat(r[7])||0;
          items.push({
            upc: upcRaw,
            name: String(r[6]||'').trim(),
            group: grRaw.toUpperCase(),
            category: String(r[3]||'').trim(),
            subCategory: String(r[4]||'').trim(),
            price: parseFloat(r[8])||0,
            stockQty: stockQty
          });
        }
        parseItems(items);
      }catch(err){
        alert('Lỗi định dạng file Excel.');
        setLoading(false);
      }
    };
    reader.readAsBinaryString(file);
  }

  function useSampleData(){
    setLoading(true);
    setTimeout(()=>parseItems(generateSampleInventory(300)),100);
  }

  function handleCreate(){
    if(!cardName.trim()||!checker.trim()||!selectedGroup) return;
    const audit={
      id:'AUD-'+Date.now(),
      cardName:cardName.trim(),
      checker:checker.trim(),
      store:user.store,
      group:selectedGroup,
      startTime:nowISO(),
      endTime:null,
      status:'Đang kiểm',
      products:allItems[selectedGroup]||[],
      counts:{},
    };
    const localLogs=lsGet('auditLogs')||[];
    localLogs.unshift(audit);
    lsSet('auditLogs',localLogs);
    onCreated(audit);
  }

  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal-content p-5">
        <h2 className="font-bold text-lg mb-4 text-white">Tạo Phiếu Kiểm Kho Mới</h2>
        <div className="form-group">
          <label>Tên phiếu / Ca trực</label>
          <input className="input-field" placeholder="Ví dụ: Ca 1" value={cardName} onChange={e=>setCardName(e.target.value)}/>
        </div>
        <div className="form-group">
          <label>Nhân viên thực hiện</label>
          <input className="input-field" placeholder="Tên nhân viên" value={checker} onChange={e=>setChecker(e.target.value)}/>
        </div>
        
        {!allItems ? (
          <div className="mt-3">
            <label className="block text-xs text-surface-400 mb-2 font-bold">CHỌN FILE DỮ LIỆU TỒN KHO</label>
            <input type="file" accept=".xlsx,.xls,.csv" className="input-field mb-3 text-xs" onChange={handleFile}/>
            <button onClick={useSampleData} className="btn-secondary w-full py-2 text-xs">
              {loading ? 'Đang phân tích...' : 'Dùng dữ liệu mẫu (Cột L làm UPC)'}
            </button>
          </div>
        ) : (
          <div className="form-group">
            <label>Chọn Nhóm Hàng (Đã ẩn sản phẩm có Tồn = 0)</label>
            <select className="input-field border-brand-500 text-white" value={selectedGroup} onChange={e=>setSelectedGroup(e.target.value)}>
              <option value="">— Chọn nhóm hàng —</option>
              {groups.map(g=><option key={g} value={g}>{g} ({allItems[g].length} SKU Tồn > 0)</option>)}
            </select>
          </div>
        )}

        <div className="flex gap-2 mt-5">
          <button onClick={onClose} className="btn-secondary flex-1 py-2 text-sm">Hủy</button>
          <button onClick={handleCreate} disabled={!selectedGroup||!cardName.trim()||!checker.trim()} className="btn-primary flex-1 py-2 text-sm">Tạo Phiếu</button>
        </div>
      </div>
    </div>
  );
}

function EntryModal({product,existingQty,onSave,onClose}){
  const [qty,setQty]=useState(existingQty!==undefined?existingQty:product.stockQty||0);
  const inputRef=useRef(null);

  useEffect(()=>{
    setTimeout(()=>inputRef.current?.select(),60);
  },[]);

  function handleSave(){
    onSave(product.upc,qty);
    onClose();
  }

  return(
    <div className="modal-overlay" onClick={e=>{if(e.target===e.currentTarget)onClose()}}>
      <div className="modal-content p-5">
        <p className="text-xs text-brand-400 font-mono mb-1">{product.upc}</p>
        <h3 className="font-bold text-white text-base mb-4">{product.name}</h3>
        
        <div className="grid grid-cols-2 gap-2 mb-4 text-center">
          <div className="bg-surface-900 p-2 rounded">
            <div className="text-xs text-surface-400">Tồn sổ sách</div>
            <div className="font-bold text-sm text-white">{fmtNum(product.stockQty)}</div>
          </div>
          <div className="bg-surface-900 p-2 rounded">
            <div className="text-xs text-surface-400">Chênh lệch</div>
            <div className={`font-bold text-sm ${(qty - product.stockQty) > 0 ? 'text-green-400' : (qty - product.stockQty) < 0 ? 'text-red-400' : 'text-gray-400'}`}>
              {(qty - product.stockQty) > 0 ? '+' : ''}{qty - product.stockQty}
            </div>
          </div>
        </div>

        <div className="flex items-center gap-2 mb-4">
          <button className="qty-btn qty-btn-minus" onClick={()=>setQty(q=>Math.max(0,q-1))}>-1</button>
          <input ref={inputRef} type="number" className="input-field text-center text-xl font-bold flex-1" value={qty} onChange={e=>setQty(Math.max(0,parseInt(e.target.value)||0))} onKeyDown={e=>e.key==='Enter'&&handleSave()}/>
          <button className="qty-btn qty-btn-plus" onClick={()=>setQty(q=>q+1)}>+</button>
        </div>
        
        <button onClick={handleSave} className="btn-primary w-full py-3 font-bold">Xác Nhận Số Lượng</button>
      </div>
    </div>
  );
}

function AuditView({audit,onUpdate,onBack,user}){
  const [tab,setTab]=useState('list');
  const [searchQuery,setSearchQuery]=useState(''); 
  const [counts,setCounts]=useState(audit.counts||{});
  const [activeProduct,setActiveProduct]=useState(null);
  const [visibleCount,setVisibleCount]=useState(PAGE_SIZE);
  const [isLocked,setIsLocked]=useState(audit.status==='Done');
  const [showCamera, setShowCamera] = useState(false);
  const products = audit.products||[];

  // ĐỒNG BỘ LIÊN THIẾT BỊ REAL-TIME QUA ĐƯỜNG TRUYỀN MẠNG CHUNG CA (BẢO VỆ CHỐNG MẤT DATA GIỮA PC VÀ ĐIỆN THOẠI)
  useEffect(()=>{
    const allLogs = lsGet('auditLogs')||[];
    const idx = allLogs.findIndex(l=>l.id===audit.id);
    if(idx>-1){
      allLogs[idx].counts = counts;
      lsSet('auditLogs',allLogs);
    }
    cloudSyncPush(audit.id, counts);
  },[counts, audit.id]);

  // Bộ lọc tìm kiếm thông minh
  const filteredSuggestions = useMemo(()=>{
    const query = searchQuery.trim().toLowerCase();
    if(!query) return products;
    return products.filter(p => p.upc.toLowerCase().includes(query) || p.name.toLowerCase().includes(query));
  }, [products, searchQuery]);

  // SỬA LỖI CÁC Ô SỐ LIỆU ĐỂ LUÔN ĐÚNG KHI SẢN PHẨM BỊ LỌC BỎ
  const computedKPIs = useMemo(()=>{
    let countedSKUs = 0;
    let diffMoney = 0;
    let shortages = 0;
    let surplus = 0;

    products.forEach(p => {
      if(counts[p.upc] !== undefined) {
        countedSKUs++;
        const delta = counts[p.upc] - (p.stockQty || 0);
        diffMoney += delta * (p.price || 0);
        if(delta < 0) shortages++;
        if(delta > 0) surplus++;
      }
    });

    return { countedSKUs, diffMoney, shortages, surplus };
  }, [products, counts]);

  const discData = useMemo(()=>{
    return products
      .filter(p => counts[p.upc] !== undefined)
      .map(p => ({...p, actualQty: counts[p.upc], disc: counts[p.upc] - (p.stockQty||0)}))
      .filter(d => d.disc !== 0)
      .sort((a,b) => Math.abs(b.disc) - Math.abs(a.disc));
  }, [products, counts]);

  // Hàm kích hoạt bật popup nhập số lượng khi nhận diện trúng mã vạch
  const handleTriggerProduct = (upcCode) => {
    const target = products.find(p => p.upc === upcCode.trim());
    if(target) {
      setActiveProduct({product: target, existingQty: counts[target.upc]});
    } else {
      alert("Mã vạch vừa quét không khớp với sản phẩm nào trong nhóm hàng này.");
    }
  };

  function handleSearchKeyDown(e){
    if(e.key==='Enter'){
      const val = searchQuery.trim();
      if(!val) return;
      handleTriggerProduct(val);
      setSearchQuery('');
    }
  }

  function saveCount(upc,qty){
    setCounts(prev=>({...prev,[upc]:qty}));
  }

  function handleLock(){
    const allLogs=lsGet('auditLogs')||[];
    const idx=allLogs.findIndex(l=>l.id===audit.id);
    if(idx>-1){
      allLogs[idx].status='Done';
      allLogs[idx].endTime=nowISO();
      allLogs[idx].counts=counts;
      lsSet('auditLogs',allLogs);
    }
    setIsLocked(true);
    onUpdate({...audit,status:'Done',endTime:nowISO(),counts});
  }

  return(
    <div className="flex flex-col min-h-screen bg-surface-950 text-white">
      <div className="top-bar px-4 py-3">
        <div className="flex items-center justify-between max-w-4xl mx-auto mb-3">
          <button onClick={onBack} className="btn-secondary p-2 flex items-center"><Icon name="arrow-left" size={14}/></button>
          <div className="text-center">
            <h1 className="font-bold text-sm text-white">{audit.cardName}</h1>
            <p className="text-xs text-surface-400">{audit.group} · {user.store}</p>
          </div>
          <span className={`chip ${isLocked?'chip-success':'chip-warning'}`}>{isLocked?'Đã Khóa':'Đang kiểm'}</span>
        </div>

        {/* HIỂN THỊ CHÍNH XÁC CÁC SỐ LIỆU ĐÃ ĐƯỢC FIX LỖI ĐỒNG BỘ */}
        <div className="grid grid-cols-3 gap-2 max-w-4xl mx-auto mb-3">
          <div className="kpi-card text-center">
            <div className="text-[11px] text-surface-400 font-medium">TỔNG SỐ SKU</div>
            <div className="text-base font-bold text-white mt-0.5">{products.length} SKU</div>
          </div>
          <div className="kpi-card text-center">
            <div className="text-[11px] text-surface-400 font-medium">ĐÃ KIỂM</div>
            <div className="text-base font-bold text-brand-400 mt-0.5">{computedKPIs.countedSKUs} SKU</div>
          </div>
          <div className="kpi-card text-center">
            <div className="text-[11px] text-surface-400 font-medium">CHÊNH LỆCH</div>
            <div className={`text-base font-bold mt-0.5 ${computedKPIs.diffMoney>0?'text-green-400':computedKPIs.diffMoney<0?'text-red-400':'text-surface-400'}`}>{fmtVND(computedKPIs.diffMoney)}</div>
          </div>
        </div>

        {/* THANH TÌM KIẾM ĐƯỢC GIỮ NGUYÊN GIAO DIỆN GỐC + THÊM NÚT CAMERA KÉM BIỂU TƯỢNG SCAN MỚI */}
        {!isLocked && (
          <div className="max-w-4xl mx-auto flex gap-2 my-2">
            <div className="search-container flex-1 relative">
              <span className="search-icon"><Icon name="scan-barcode" size={16}/></span>
              <input
                className="input-field bg-surface-900 border-surface-700 text-white font-medium placeholder-surface-500 pl-10"
                style={{paddingLeft:'38px'}}
                placeholder="Nhập tên SP / Gõ UPC / Quét..."
                value={searchQuery}
                onChange={e=>setSearchQuery(e.target.value)}
                onKeyDown={handleSearchKeyDown}
              />
            </div>
            <button onClick={() => setShowCamera(true)} className="btn-primary px-3 flex items-center justify-center gap-1" title="Quét bằng camera điện thoại">
              <Icon name="camera" size={16}/>
              <span className="text-xs hidden sm:inline">Quét Cam</span>
            </button>
          </div>
        )}

        <div className="max-w-4xl mx-auto flex gap-4 text-xs font-semibold justify-center mt-3 border-b border-surface-800">
          <button onClick={()=>setTab('list')} className={`pb-2 px-2 ${tab==='list'?'text-brand-400 border-b-2 border-brand-500 font-bold':''}`}>Danh sách ({filteredSuggestions.length})</button>
          <button onClick={()=>setTab('disc')} className={`pb-2 px-2 ${tab==='disc'?'text-brand-400 border-b-2 border-brand-500 font-bold':''}`}>Chênh lệch ({discData.length})</button>
        </div>
      </div>

      <div className="flex-1 max-w-4xl mx-auto w-full px-4 pt-2 pb-24">
        {tab==='list' && (
          <div className="card overflow-hidden">
            {filteredSuggestions.slice(0,visibleCount).map(p=>{
              const counted=counts[p.upc]!==undefined;
              return(
                <div key={p.upc} className={`product-row p-3 flex justify-between items-center ${counted?'counted-row':''}`} onClick={()=>{if(!isLocked)setActiveProduct({product:p,existingQty:counts[p.upc]})}}>
                  <div>
                    <h4 className="text-sm font-semibold text-white">{p.name}</h4>
                    <p className="text-xs text-surface-400 font-mono mt-0.5">{p.upc} · Tồn sổ: <strong className="text-surface-200">{p.stockQty}</strong></p>
                  </div>
                  <div className="text-right">
                    {counted ? (
                      <span className="bg-brand-900 text-brand-400 border border-brand-800 text-xs font-bold px-2.5 py-1 rounded">{counts[p.upc]} SKU</span>
                    ) : (
                      <span className="bg-surface-800 text-surface-400 text-xs px-2 py-1 rounded">Chưa đếm</span>
                    )}
                  </div>
                </div>
              );
            })}
            {filteredSuggestions.length > visibleCount && (
              <button onClick={()=>setVisibleCount(c=>c+PAGE_SIZE)} className="w-full py-3 bg-surface-900 text-xs text-brand-400 font-bold text-center">Xem thêm...</button>
            )}
          </div>
        )}

        {tab==='disc' && (
          <div className="card p-3">
            <table className="disc-table">
              <thead>
                <tr><th>Sản phẩm</th><th className="text-right">Sổ sách</th><th className="text-right">Thực tế</th><th className="text-right">Lệch</th></tr>
              </thead>
              <tbody>
                {discData.map(d=>(
                  <tr key={d.upc}>
                    <td><div className="text-sm font-medium text-white truncate max-w-[160px]">{d.name}</div><div className="text-xs text-surface-500 font-mono">{d.upc}</div></td>
                    <td className="text-right text-surface-400">{d.stockQty}</td>
                    <td className="text-right text-white font-bold">{d.actualQty}</td>
                    <td className={`text-right font-bold ${d.disc>0?'text-green-400':'text-red-400'}`}>{d.disc>0?'+':''}{d.disc}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>

      <div className="fixed bottom-0 left-0 right-0 p-4 bg-surface-950 border-t border-surface-800">
        <div className="max-w-4xl mx-auto flex gap-2">
          {!isLocked && <button onClick={handleLock} className="btn-danger w-full py-3 font-bold">Hoàn Thành & Khóa Phiếu</button>}
          {isLocked && <div className="text-center text-xs text-surface-500 w-full py-2">Phiếu đã khóa thành công.</div>}
        </div>
      </div>

      {activeProduct && <EntryModal product={activeProduct.product} existingQty={activeProduct.existingQty} onSave={saveCount} onClose={()=>setActiveProduct(null)} />}
      {showCamera && <CameraScanner onScan={handleTriggerProduct} onClose={()=>setShowCamera(false)} />}
    </div>
  );
}

function Dashboard({user,onLogout,onOpenAudit}){
  const [logs,setLogs]=useState([]);
  const [showNew,setShowNew]=useState(false);

  useEffect(()=>{
    const all = lsGet('auditLogs')||[];
    setLogs(all.filter(l=>user.isAdmin || l.store===user.store));
  },[showNew, user]);

  function handleCreated(newAudit){
    setShowNew(false);
    onOpenAudit(newAudit);
  }

  return(
    <div className="min-h-screen bg-surface-950 text-white">
      <div className="top-bar px-4 py-4 flex justify-between items-center max-w-4xl mx-auto">
        <div>
          <h1 className="font-bold text-base text-white">HỆ THỐNG KIỂM KHO 7-ELEVEN</h1>
          <p className="text-xs text-surface-400">Cửa hàng: {user.store} · Tài khoản: {user.name}</p>
        </div>
        <button onClick={onLogout} className="btn-secondary p-2"><Icon name="log-out" size={14}/></button>
      </div>

      <div className="max-w-4xl mx-auto px-4 mt-6">
        <h3 className="font-bold text-sm text-surface-300 mb-3">DANH SÁCH PHIẾU ĐỒNG BỘ TẠI CỬA HÀNG</h3>
        {logs.length===0 ? (
          <div className="card p-10 text-center text-surface-500 text-sm">Chưa có dữ liệu kiểm kho nào ở đây. Nhấp dấu (+) để bắt đầu.</div>
        ) : (
          logs.map(l=>(
            <div key={l.id} className="audit-log-item rounded-lg p-3 cursor-pointer flex justify-between items-center" onClick={()=>onOpenAudit(l)}>
              <div>
                <h4 className="font-bold text-white text-sm">{l.cardName}</h4>
                <p className="text-xs text-surface-400 mt-0.5">Nhóm: {l.group} · Nhân viên: {l.checker}</p>
              </div>
              <span className={`chip ${l.status==='Done'?'chip-success':'chip-warning'}`}>{l.status==='Done'?'Đã Khóa':`${Object.keys(l.counts||{}).length} SKU Đếm`}</span>
            </div>
          ))
        )}
      </div>

      <button className="fab text-xl font-bold" onClick={()=>setShowNew(true)}>+</button>
      {showNew && <NewAuditModal user={user} onClose={()=>setShowNew(false)} onCreated={handleCreated} />}
    </div>
  );
}

function App(){
  const [user,setUser]=useState(()=>lsGet('currentUser'));
  const [currentAudit,setCurrentAudit]=useState(null);

  if(!user) return <LoginScreen onLogin={(u)=>setUser(u)}/>;
  if(currentAudit) return <AuditView audit={currentAudit} onUpdate={(a)=>setCurrentAudit(a)} onBack={()=>setCurrentAudit(null)} user={user}/>;
  return <Dashboard user={user} onLogout={()=>{lsSet('currentUser',null);setUser(null)}} onOpenAudit={(a)=>setCurrentAudit(a)}/>;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
